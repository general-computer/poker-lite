<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Hold'em — Poker Lite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ── Start Screen ─────────────────────────────────────────────────────────── -->
  <div id="start-screen" class="screen">
    <div class="start-card">
      <h1>♠♥ Texas Hold'em ♦♣</h1>
      <p class="subtitle">Poker Lite</p>

      <div class="config-section">
        <h2>Table Setup</h2>

        <div class="config-row">
          <label for="bot-count">Opponents (bots)</label>
          <select id="bot-count">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8" selected>8</option>
          </select>
        </div>

        <div class="config-row">
          <label for="starting-stack">Starting stack</label>
          <input type="number" id="starting-stack" value="1000" min="50" max="100000" step="10">
        </div>

        <div class="config-row">
          <label for="small-blind">Small blind</label>
          <input type="number" id="small-blind" value="5" min="1" max="1000" step="1">
        </div>

        <div class="config-row">
          <label for="big-blind">Big blind</label>
          <input type="number" id="big-blind" value="10" min="2" max="2000" step="1">
        </div>

        <div class="config-row">
          <label for="bot-personality">Bot style</label>
          <select id="bot-personality">
            <option value="mixed" selected>Mixed (varied)</option>
            <option value="aggressive">Aggressive</option>
            <option value="passive">Passive</option>
            <option value="random">Random (wild)</option>
          </select>
        </div>
      </div>

      <button id="start-btn" class="btn btn-primary btn-large">Deal Me In</button>
    </div>
  </div>

  <!-- ── Game Screen ──────────────────────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">
    <!-- Top bar -->
    <div id="top-bar">
      <span id="hand-number">Hand #1</span>
      <span id="blind-level">Blinds 5/10</span>
      <span id="phase-display">Pre-flop</span>
    </div>

    <!-- Table -->
    <div id="table">
      <!-- Seats populated by JS -->
      <div id="seats-container"></div>

      <!-- Community cards -->
      <div id="community">
        <div id="community-cards"></div>
        <div id="pot-display">Pot: 0</div>
      </div>
    </div>

    <!-- Human controls -->
    <div id="controls">
      <div id="action-buttons">
        <button class="btn btn-fold" data-action="fold">Fold</button>
        <button class="btn btn-check" data-action="check">Check</button>
        <button class="btn btn-call" data-action="call">Call <span id="call-amount"></span></button>
        <button class="btn btn-bet" data-action="bet">Bet</button>
        <button class="btn btn-raise" data-action="raise">Raise</button>
      </div>
      <div id="bet-controls" class="hidden">
        <input type="range" id="bet-slider" min="0" max="1000" value="0" step="1">
        <input type="number" id="bet-input" min="0" max="1000" value="0" step="1">
        <button class="btn btn-primary" id="confirm-bet">Confirm</button>
        <button class="btn btn-secondary" id="cancel-bet">Cancel</button>
      </div>
    </div>

    <!-- Hand result overlay -->
    <div id="result-overlay" class="hidden">
      <div id="result-card">
        <h2 id="result-title"></h2>
        <div id="result-winners"></div>
        <div id="result-hands"></div>
        <button id="next-hand-btn" class="btn btn-primary btn-large">Next Hand</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
